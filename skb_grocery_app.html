<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>SKB Grocery List</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1B3A5C;--blue-mid:#2E5E8E;--blue-light:#E6F0FB;
  --green:#3B6D11;--green-light:#EAF3DE;
  --border:#E0E0E0;--bg:#F5F7FA;--white:#FFFFFF;
  --text:#1A1A1A;--muted:#666;--radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.app-header{background:var(--blue);padding:16px;position:sticky;top:0;z-index:100}
.app-header h1{color:#fff;font-size:14px;font-weight:600;line-height:1.4}
.app-header .subtitle{color:rgba(255,255,255,0.7);font-size:12px;margin-top:2px}
.date-badge{background:rgba(255,255,255,0.15);color:#fff;font-size:11px;padding:3px 10px;border-radius:99px;display:inline-block;margin-top:6px}
.search-bar{display:flex;gap:8px;margin-top:12px}
.search-bar input{flex:1;padding:10px 14px;border-radius:var(--radius-sm);border:none;font-size:15px;background:rgba(255,255,255,0.15);color:#fff;outline:none}
.search-bar input::placeholder{color:rgba(255,255,255,0.55)}
.search-bar input:focus{background:rgba(255,255,255,0.25)}
.clear-btn{background:rgba(255,255,255,0.15);border:none;color:#fff;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer}
.filter-tabs{display:flex;gap:6px;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter-tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 14px;border-radius:99px;border:1px solid var(--border);font-size:13px;cursor:pointer;white-space:nowrap;background:var(--white);color:var(--muted);font-weight:500}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.summary-bar{background:var(--blue-light);padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:16px;font-size:13px}
.sum-item{color:var(--blue-mid);font-weight:500}
.sum-item span{color:var(--blue);font-weight:700}
.category-block{margin-bottom:6px}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--white);border-top:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.cat-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:var(--blue)}
.cat-icon{font-size:18px;width:26px;text-align:center}
.cat-badge{background:var(--blue-light);color:var(--blue-mid);font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600}
.cat-badge.done{background:var(--green-light);color:var(--green)}
.cat-chevron{font-size:13px;color:var(--muted);transition:transform 0.2s}
.cat-chevron.open{transform:rotate(180deg)}
.item-row{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border)}
.item-row.done-row{background:#F0FBF0;opacity:0.8}
.item-check{width:24px;height:24px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--white)}
.item-check.checked{background:var(--green);border-color:var(--green)}
.item-check.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-name.done-name{text-decoration:line-through;color:var(--muted)}
.item-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
.unit-select{border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 6px;font-size:13px;background:var(--green-light);color:var(--green);font-weight:600;cursor:pointer;max-width:70px;outline:none}
.qty-wrap{display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.qty-btn{width:32px;height:32px;border:none;background:var(--bg);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--blue-mid);font-weight:600}
.qty-btn:active{background:var(--blue-light)}
.qty-input{width:36px;height:32px;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);text-align:center;font-size:14px;font-weight:600;background:var(--white);color:var(--text);outline:none}
.qty-input::-webkit-inner-spin-button,.qty-input::-webkit-outer-spin-button{-webkit-appearance:none}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--blue);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;z-index:200}
.bottom-count{color:rgba(255,255,255,0.8);font-size:13px}
.bottom-count strong{color:#fff;font-size:16px}
.bottom-actions{display:flex;gap:8px}
.btn-outline{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-weight:500}
.btn-outline:active{background:rgba(255,255,255,0.25)}
.btn-solid{background:#fff;border:none;color:var(--blue);padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-weight:700}
.btn-solid:active{background:var(--blue-light)}
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:15px}
</style>

<body>

<div class="app-header">

  </div>
</div>

  <button class="tab" onclick="setFilter('pending',this)">Pending</button>
  <button class="tab" onclick="setFilter('done',this)">Done</button>
  <button class="tab" onclick="setFilter('Spices & Masalas',this)">Spices</button>

  <button class="tab" onclick="setFilter('Dairy & Eggs',this)">Dairy</button>

  <button class="tab" onclick="setFilter('Frozen Food',this)">Frozen</button>
  <button class="tab" onclick="setFilter('Canned & Packaged',this)">Canned</button>
  <button class="tab" onclick="setFilter('Nuts & Dry Fruits',this)">Nuts</button>
  <button class="tab" onclick="setFilter('Beverages',this)">Beverages</button>
  <button class="tab" onclick="setFilter('Containers & Disposables',this)">Containers</button>
  <button class="tab" onclick="setFilter('Household & Cleaning',this)">Cleaning</button>
  <button class="tab" onclick="setFilter('Kitchen Supplies',this)">Kitchen</button>
</div>

<div class="summary-bar">
  <div class="sum-item">Total: <span id="sumTotal">0</span></div>
  <div class="sum-item">Done: <span id="sumDone">0</span></div>
  <div class="sum-item">Pending: <span id="sumPending">0</span></div>
</div>

<div id="listContainer"></div>

<div class="bottom-bar">
  <div class="bottom-count"><strong id="bottomDone">0</strong> of <strong id="bottomTotal">0</strong> done</div>
  <div class="bottom-actions">
    <button class="btn-outline" onclick="resetAll()">Reset</button>
    <button class="btn-solid" onclick="exportSummary()">Export</button>
  </div>
</div>

let state={}, currentFilter='all', searchTerm='';
const STORAGE_KEY='skb_grocery_v1';

function loadState(){try{const s=localStorage.getItem(STORAGE_KEY);if(s)state=JSON.parse(s);}catch(e){}}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}
function getItem(id){if(!state[id])state[id]={qty:0,unit:MASTER[id][2],done:false};return state[id];}

function setFilter(f,el){currentFilter=f;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}
function clearSearch(){document.getElementById('searchInput').value='';searchTerm='';applyFilters();}
function applyFilters(){searchTerm=document.getElementById('searchInput').value.toLowerCase().trim();render();}
function unitOptions(sel){return UNITS.map(u=>`<option value="${u}"${u===sel?' selected':''}>${u}</option>`).join('');}

function render(){
  const container=document.getElementById('listContainer');
  const cats=[...new Set(MASTER.map(r=>r[0]))];
  let html='',totalItems=0,doneItems=0;
  cats.forEach(cat=>{
    const items=MASTER.map((r,i)=>({cat:r[0],name:r[1],id:i})).filter(it=>{
      if(it.cat!==cat) return false;
      if(searchTerm&&!it.name.toLowerCase().includes(searchTerm)&&!it.cat.toLowerCase().includes(searchTerm)) return false;
      const s=getItem(it.id);
      if(currentFilter==='pending'&&s.done) return false;
      if(currentFilter==='done'&&!s.done) return false;
      if(currentFilter!=='all'&&currentFilter!=='pending'&&currentFilter!=='done'&&it.cat!==currentFilter) return false;
      return true;
    });
    if(!items.length) return;
    const catDone=items.filter(it=>getItem(it.id).done).length;
    totalItems+=items.length; doneItems+=catDone;
    const icon=CAT_ICONS[cat]||'📦';
    const catId='cat_'+cat.replace(/[^a-z0-9]/gi,'_');
    html+=`<div class="category-block">
      <div class="cat-header" onclick="toggleCat('${catId}')">
        <div class="cat-title"><span class="cat-icon">${icon}</span>${cat}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="cat-badge${catDone===items.length&&items.length>0?' done':''}">${catDone}/${items.length}</span>
          <span class="cat-chevron open" id="${catId}_chev">▼</span>
        </div>
      </div><div id="${catId}">`;
    items.forEach(it=>{
      const s=getItem(it.id);
      html+=`<div class="item-row${s.done?' done-row':''}" id="row_${it.id}">
        <div class="item-check${s.done?' checked':''}" onclick="toggleDone(${it.id})"></div>
        <div class="item-info"><div class="item-name${s.done?' done-name':''}">${it.name}</div></div>
        <div class="item-controls">
          <select class="unit-select" onchange="changeUnit(${it.id},this.value)">${unitOptions(s.unit)}</select>
          <div class="qty-wrap">
            <button class="qty-btn" onclick="changeQty(${it.id},-1)">−</button>
            <input class="qty-input" type="number" value="${s.qty}" min="0" onchange="setQty(${it.id},this.value)" onfocus="this.select()">
            <button class="qty-btn" onclick="changeQty(${it.id},1)">+</button>
          </div>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  if(!html) html=`<div class="empty">No items match your filter</div>`;
  container.innerHTML=html;
  document.getElementById('sumTotal').textContent=totalItems;
  document.getElementById('sumDone').textContent=doneItems;
  document.getElementById('sumPending').textContent=totalItems-doneItems;
  document.getElementById('bottomDone').textContent=doneItems;
  document.getElementById('bottomTotal').textContent=totalItems;
}

function toggleCat(id){
  const el=document.getElementById(id),chev=document.getElementById(id+'_chev'),hidden=el.style.display==='none';
  el.style.display=hidden?'':'none';chev.classList.toggle('open',hidden);
}
function toggleDone(id){const s=getItem(id);s.done=!s.done;if(s.done&&s.qty===0)s.qty=1;saveState();render();}
function changeQty(id,delta){const s=getItem(id);s.qty=Math.max(0,(s.qty||0)+delta);saveState();const inp=document.querySelector(`#row_${id} .qty-input`);if(inp)inp.value=s.qty;}
function setQty(id,val){const s=getItem(id);s.qty=Math.max(0,parseInt(val)||0);saveState();}
function changeUnit(id,val){getItem(id).unit=val;saveState();}
function resetAll(){if(!confirm('Reset all quantities and status? This cannot be undone.'))return;state={};saveState();render();}

function exportSummary(){
  const ordered=[];
  MASTER.forEach((r,i)=>{const s=getItem(i);if(s.qty>0||s.done)ordered.push({name:r[1],qty:s.qty,unit:s.unit,done:s.done});});
  if(!ordered.length){alert('No items have quantities yet.');return;}
  const date=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const LINE='─'.repeat(40);
  const makeRow=(num,name,qty,unit)=>{
    const prefix=`${num}. ${name} `,suffix=` ${qty} ${unit}`;
    return prefix+'.'.repeat(Math.max(2,40-prefix.length-suffix.length))+suffix;
  };
  const rows=ordered.map((it,i)=>makeRow(i+1,it.name,it.qty,it.unit));
  const doneCount=ordered.filter(it=>it.done).length;
  const txt=['SKB GROCERY ORDER',`Date: ${date}`,LINE,...rows,LINE,`Total: ${ordered.length} items ordered  |  ${doneCount} received`].join('\n');
  if(navigator.share){navigator.share({title:'SKB Grocery Order',text:txt}).catch(()=>fallbackCopy(txt));}else{fallbackCopy(txt);}
}

function fallbackCopy(txt){
  const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();
  document.execCommand('copy');document.body.removeChild(ta);
  alert('Order copied to clipboard! Paste it in WhatsApp or Notes.');
}

document.getElementById('dateBadge').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
loadState();render();
</script>
</body>
</html>
